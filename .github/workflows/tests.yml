name: Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # Same entrypoint as local development — keeps CI and `make test` in sync.
      - name: Run tests
        run: make test
        env:
          # flowsint_core requires AUTH_SECRET at import time (provided by
          # .env locally). Dummy value — no service is reached during tests.
          AUTH_SECRET: ci-only-dummy-secret
